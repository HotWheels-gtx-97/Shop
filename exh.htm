<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Wheels Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
    }
    .logo {
      width: 120px;
      margin-right: 24px;
    }
    .nav {
      flex: 1;
    }
    .nav ul {
      display: flex;
      flex-wrap: wrap;
      list-style: none;
      padding: 0;
      margin: 0;
      gap: 18px;
    }
    .nav ul li {
      font-size: 14px;
      cursor: pointer;
      padding: 4px 0;
      background-color: #1edcf981;
      border-radius: 9px;
      padding: 5px;
    }
    .search-cart {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .main-title {
      text-align: center;
      font-size: 32px;
      margin: 40px 0 24px;
      font-weight: 500;
    }
    .products-container {
      display: flex;
      flex-wrap: wrap;
      gap: 38px;
      justify-content: center;
      margin: 24px;
    }
    .product {
      background: #fafafa;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      width: 220px;
      padding: 14px;
      text-align: center;
      position: relative;
    }
    .product img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .sold-out {
      position: absolute;
      left: 14px;
      top: 14px;
      background: #e0e0e0;
      color: #757575;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 5px;
      font-weight: bold;
    }
    .product-title {
      font-size: 16px;
      margin: 12px 0 6px;
      font-weight: bold;
      color: #333;
    }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }
    .action-btn {
      padding: 6px 14px;
      font-size: 13px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #f34468;
      color: #fff;
      transition: background 0.2s;
    }
    .action-btn.add {
      background: #00c853;
    }
    /* Responsive for mobile */
    @media screen and (max-width: 700px) {
      .header {
        padding: 16px 10px;
        flex-direction: column;
        align-items: flex-start;
      }
      .main-title {
        font-size: 22px;
        margin: 24px 0 16px;
      }
      .products-container {
        gap: 18px;
        margin: 10px;
      }
      .product {
        width: 95vw;
        max-width: 320px;
        margin: 0 auto;
      }
      .nav ul {
        gap: 7px;
        font-size: 12px;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <!-- Header (Logo + Navigation + Search/Cart) -->
  <div class="header">
    <img src="https://cms-assets.tutsplus.com/cdn-cgi/image/width=850/uploads/users/115/posts/93889/final_image/How_to_Create_the_Hot_Wheels_Logo_Tutorial_image_19_hot_wheels_logo_final_min.jpg" alt="Logo" class="logo" style="border-radius: 10cm;">
    <nav class="nav">
      <ul>
        <li>HOT WHEELS</li>
        <li>MATCHBOX</li>
        <li>AMERICAN DIORAMA</li>
        <li>RC CARS</li>
        <li>ACTION FIGURES</li>
        <li>CLEARANCE</li>
        <li>PROTECTORS</li>
        <!-- Add more menu items as needed -->
      </ul>
    </nav>
    <div class="search-cart">
      <span>&#128269;</span>
      <span>&#128722;</span>
    </div>
  </div>

  <!-- Main Title -->
  <div class="main-title">Hot Wheels</div>
  
  <!-- Products Grid -->
  <div class="products-container">
    <div class="product">
      <span class="sold-out">SOLD OUT</span>
      <img src="https://i.ibb.co/k2vVfsyH/A1.jpg" alt="Crate Racer">
      <div class="product-title">INDIAN CARD Crate Racer</div>
      <div class="actions">
        <button class="action-btn">Quickshop</button>
        <button class="action-btn add">Add to Cart</button>
      </div>
    </div>
    <div class="product">
      <img src="https://ibb.co/TnYYwhW" alt="Twin Dorado">
      <div class="product-title">INDIAN CARD Twin Dorado</div>
      <div class="actions">
        <button class="action-btn">Quickshop</button>
        <button class="action-btn add">Add to Cart</button>
      </div>
    </div>
    <div class="product">
      <img src="https://blogassets.airtel.in/wp-content/uploads/2024/12/hotwheels.png" alt="Gotta Go">
      <div class="product-title">INDIAN CARD Gotta Go</div>
      <div class="actions">
        <button class="action-btn">Quickshop</button>
        <button class="action-btn add">Add to Cart</button>
      </div>
    </div>
    <div class="product">
      <img src="https://media.istockphoto.com/id/545788626/photo/67-pontiac-gto-hot-wheels-diecast-toy-car.jpg?s=612x612&w=0&k=20&c=1g4FFYwq9JueUjmvFVovsv9dIiLbfu-F3dAR33HDcq4=" alt="Kei Swap">
      <div class="product-title">INDIAN CARD Kei Swap</div>
      <div class="actions">
        <button class="action-btn">Quickshop</button>
        <button class="action-btn add">Add to Cart</button>
      </div>
    </div>
    <!-- Add more products as needed -->
  </div>
  <center style="margin: 120px;">
    <a href="https://www.instagram.com/hot_wheels_gtx_0007/">
    <input type="submit" value="Get In Contact to Buy" style="padding: 10px 20px; font-size: 16px; background-color: #f34468; color: white; border: none; border-radius: 5px; cursor: pointer;">
    </a>
  </center>
</body>
</html>
