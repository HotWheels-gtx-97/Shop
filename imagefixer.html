<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Preview</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6c63ff, #5a5acb);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

/* INPUTS */
.controls {
    margin-bottom: 20px;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
    width: 200px;
}

/* CARD */
.card {
    width: 410px;
    height: 364px;
    background: #eaeaea;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    position: relative;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* STOCK TAG */
.stock {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #1db954;
    color: white;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

/* CONTENT */
.content {
    padding: 15px;
}

.content h3 {
    margin: 5px 0;
    font-size: 18px;
    color: #333;
}

.price {
    color: #ff5a5a;
    font-size: 22px;
    font-weight: bold;
    margin: 8px 0;
}

/* BUTTONS */
.buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.whatsapp {
    flex: 1;
    background: #25D366;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.cart {
    flex: 1;
    background: #ff5a5a;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

/* WATERMARK */
.watermark {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 11px;
    color: #555;
    opacity: 0.7;
}

</style>
</head>

<body>

<div class="controls">
    <input type="text" id="imgUrl" placeholder="Paste Image URL">
    <input type="file" id="imgFile">
</div>

<div class="card">
    
    <div class="stock">IN STOCK</div>

    <img id="previewImg" src="https://via.placeholder.com/400x200">

    <div class="content">
        <h3>Product Name</h3>
        <div class="price">₹999</div>

        <div class="buttons">
            <button class="whatsapp">📱 WhatsApp</button>
            <button class="cart">Add to Cart</button>
        </div>
    </div>

    <div class="watermark">made by vipul</div>

</div>

<script>

// URL input
document.getElementById("imgUrl").addEventListener("input", function() {
    document.getElementById("previewImg").src = this.value;
});

// File input
document.getElementById("imgFile").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("previewImg").src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
});

</script>

</body>
</html>
